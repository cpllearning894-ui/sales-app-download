name: Unlock Code

on:
  workflow_dispatch:

jobs:
  unlock:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Read code
        run: |
          CODE=$(jq -r '.code' unlock-code.json)

          if [ -f codes.json ]; then
            jq --arg code "$CODE" '.[$code].used=true' codes.json > temp.json
            mv temp.json codes.json
          fi

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add codes.json
          git commit -m "Code used"
          git push
